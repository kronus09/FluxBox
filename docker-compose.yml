services:
  fluxbox:
    # 镜像地址，确保与 GitHub Actions 推送的一致
    image: ghcr.io/kronus09/fluxbox:latest
    container_name: fluxbox
    ports:
      - "20504:20504"
    volumes:
      # 使用绑定挂载，数据存储在当前目录的 data 文件夹
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release